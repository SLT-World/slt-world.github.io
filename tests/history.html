<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <h1>Test: History API</h1>
    <p>Tests for the availability & support of the History API.</p>
    <hr>
    <ul id="results">
      <li>
        <strong>History:</strong>
        <button onclick="pushStateA()">Push State</button>
        <button onclick="pushStateB()">Push State (Hash)</button>
        <button onclick="replaceStateA()">Replace State</button>
        <button onclick="replaceStateB()">Replace State (Hash)</button>
      </li>
      <li>
        <strong>Location:</strong>
        <button onclick="assignA()">Assign</button>
        <button onclick="assignB()">Assign (Hash)</button>
        <button onclick="replaceA()">Replace</button>
        <button onclick="replaceB()">Replace (Hash)</button>
      </li>
    </ul>
    <script>
      const list = document.getElementById("results");
      function logList(success, text, result) {
        const li = document.createElement("li");
        if (success != null) { li.classList.add(success ? "success" : "fail"); }
        li.innerHTML = `<strong>${text}</strong>`;
        if (result !== "") {
          li.insertAdjacentHTML('beforeend', " - ");
          const code = document.createElement("code");
          code.textContent = result;
          li.appendChild(code);
        }
        list.appendChild(li);
        return li;
      }
      function logHeader(text) {
        const h = document.createElement("h2");
        h.innerHTML = text;
        list.appendChild(h);
      }
      const hs = ('history' in window)
      logList(hs, "History API", hs ? "Supported" : "Unsupported");
      if (hs) {
        function pushStateA() {
          history.pushState({}, '', '/?a=b');
        }

        function pushStateB() {
          history.pushState({}, '', '/#a=b');
        }

        function replaceStateA() {
          history.replaceState({}, '', '/?a=b');
        }

        function replaceStateB() {
          history.replaceState({}, '', '/#a=b');
        }

        function assignA() {
          location.assign('/?a=b');
        }

        function assignB() {
          location.assign('/#a=b');
        }

        function replaceA() {
          location.replace('/?a=b');
        }

        function replaceB() {
          location.replace('/#a=b');
        }
      }
    </script>
  </body>
</html>
