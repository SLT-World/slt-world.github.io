<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}
  <body>
    <div class="content">
      {%- include header.html -%}
      {% if page.title %}
      <h1>{{ page.title | escape }}</h1>
      {% endif %}
      {% if page.description %}
      <p>{{ page.description | escape }}</p>
      {% endif %}
      {{ content }}
    </div>
  </body>
</html>
