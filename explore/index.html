@font-face {
    font-family: brands;
    src: url("emoji/brands.ttf") format('truetype');
}

* {
    font-family: monospace, Tahoma, sans-serif, 'brands';
}

#directory_grid {
    display: grid;
    gap: 25px;
    grid-template-columns: repeat(auto-fill, 300px);
    width: 100%;
}

#directory_grid > div {
    min-height: 375px;
    width: auto;
    align-items: center;
    justify-content: stretch;
    font-size: medium;
    padding: 0;
    gap: 0;
    position: relative;
    transition: transform 0.25s ease;
}

#directory_grid > div:hover {
    transform: scale(1.025);
}

#directory_grid > div > div:not(.image_container) {
    height: 100%;
    width: 100%;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

#directory_grid > div > div > .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 10px;
    border-bottom-width: 1px;
    border-bottom-style: solid;
    border-color: var(--border-color);
    overflow: clip;
}

#directory_grid > div > div > .header > .icon > img {
    border-radius: 5px;
    object-fit: cover;
}

#directory_grid > div > div > .separator {
    height: 1px;
    min-height: 1px;
    background: var(--border-color);
}

#directory_grid > div > .image_container {
    width: 100%;
    min-height: 200px;
    height: 200px;
    background: var(--primary-color);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-radius: 5px 5px 0 0;
    overflow: hidden;
}

#directory_grid > div > .image_container > .material-symbols-rounded {
    font-size: 48px;
}

/*#directory_grid > div > .featured_star {
    z-index: 1;
    font-variation-settings: 'FILL' 1;
    color: gold;
    transform: rotate(45deg);
    position: absolute;
    top: -17.5px;
    right: -17.5px;
    text-shadow: 0 0 5px gold, 0 0 10px gold;
    font-size: 35px;
}*/

#directory_grid > div > .image_container > img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
}

#directory_grid > div > div > .header > .icon:first-child {
    width: 35px;
    height: 35px;
    background: var(--primary-color);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#directory_grid > div > div > .header > div:not(:first-child) {
    display: flex;
    flex-direction: column;
    flex: 1;
}

#directory_grid > div > div > p {
    height: 100%;
    white-space: break-spaces;
}

.material-symbols-rounded {
    color: var(--gray-color);
    font-size: 24px;
}

#search_options {
    flex-direction: row;
    padding: 5px;
}

#search_input {
    margin: 5px;
    margin-left: auto;
    height: 35px;
}

#search_options > div > button {
    padding: 0 5px;
    width: 100%;
    background: var(--primary-color);
    outline: 1px solid transparent;
}
#search_options > div > button.selected {
    border: 1px solid var(--accent-color);
    outline: 1px solid var(--accent-color);
}

@media screen and (max-width: 679px) {
    #directory_grid {
        display: flex;
        flex-direction: column;
    }
    #directory_grid > div {
        width: 100%;
    }
    #search_options {
        flex-direction: column;
    }
    #search_input {
        margin-left: 5px;
        margin-top: -5px;
    }
}
path#github { fill: #181717; }
path#unity_border { fill: #4c4c4c; }
path#unity_top { fill: #818181; }
path#unity_left { fill: #4B4B4B; }
path#unity_right { fill: #000000; }
@media (prefers-color-scheme: dark) {

    path#unity_border { fill: white; }
    path#unity_top { fill: white; }
    path#unity_left { fill: white; }
    path#unity_right { fill: white; }
}

const directoryGrid = document.getElementById("directory_grid");
const searchInput = document.getElementById("search_input");

function switchOption(button) {
    navigateOption(button.dataset.type);
}

let entriesDisplayed;

navigateOption('featured');

function navigateOption(type) {
    if (type != 'custom') {
        if (type == 'all') entriesDisplayed = entries;
        else if (type != 'featured') entriesDisplayed = entries.filter(i => i.state == type);
        else entriesDisplayed = entries.filter(i => "featured" in i);
    }
    renderEntries(type);
}

function renderEntries(type) {
    if (document.startViewTransition) {
        document.startViewTransition(() => {
            directoryGrid.innerHTML = "";
            document.querySelectorAll("#search_options > div > button").forEach(i => i.classList.remove("selected"));
            document.querySelector(`button[data-type='${type}']`)?.classList.add("selected");
            entriesDisplayed.forEach(i => insert_entry(i));
        });
    } else {
        directoryGrid.innerHTML = "";
        document.querySelectorAll("#search_options > div > button").forEach(i => i.classList.remove("selected"));
        document.querySelector(`button[data-type='${type}']`)?.classList.add("selected");
        entriesDisplayed.forEach(i => insert_entry(i));
    }
}

searchInput.addEventListener("input", function(event) {
    let query = event.target.value.toLowerCase();
    if (query == "") return navigateOption('featured');
    entriesDisplayed = entries.filter(i => i.title.toLowerCase().includes(query) || i.subtext.toLowerCase().includes(query) || i.description.toLowerCase().includes(query));
    navigateOption('custom');
});
